global
    log stdout format raw local0
    maxconn 2048

defaults
    mode http
    log global
    option httplog
    option forwardfor
    timeout connect 5s
    timeout client 30s
    timeout server 30s
    timeout http-request 10s

frontend treehammock_http
    bind *:8080
    http-request set-header X-Forwarded-Proto http
    http-request set-header X-Forwarded-Host %[req.hdr(Host)]
    default_backend treehammock_host_api

backend treehammock_host_api
    balance roundrobin
    option httpchk GET /health/ready
    http-check expect status 200

    server api_host host.docker.internal:5001 check
