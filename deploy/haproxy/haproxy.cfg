global
    log stdout format raw local0
    maxconn 2048

# Local Docker integration profile.
# Production should place Cloudflare in front of HAProxy and forbid origin bypass.
# See docs/deployment/CLOUDFLARE_HAPROXY_ABUSE_PROFILE_1_0_0.md for the production edge profile.
#
# Production sketch:
#   - allow only Cloudflare IP ranges, Cloudflare Tunnel, or another trusted private ingress to reach this listener
#   - trust CF-Connecting-IP / True-Client-IP only after source validation
#   - normalize the trusted visitor IP into X-Forwarded-For for ASP.NET Core
#   - set X-Forwarded-Proto to https when Cloudflare terminates public TLS
#   - never expose Kestrel directly to the public internet
#
# Example production-only source validation shape:
#   acl from_cloudflare src -f /usr/local/etc/haproxy/cloudflare-ips.lst
#   http-request deny unless from_cloudflare
#   http-request set-header X-Forwarded-For %[req.hdr(CF-Connecting-IP)] if from_cloudflare { req.hdr(CF-Connecting-IP) -m found }
#   http-request set-header X-Forwarded-Proto https
#   http-request set-header X-Forwarded-Host %[req.hdr(Host)]
#   http-request set-header X-Cloudflare-Ray %[req.hdr(CF-Ray)] if { req.hdr(CF-Ray) -m found }
#   http-request del-header CF-Connecting-IP
#   http-request del-header True-Client-IP

defaults
    mode http
    log global
    option httplog
    # Local integration uses HAProxy's client address. Production should normalize Cloudflare's
    # trusted visitor IP into X-Forwarded-For after validating the peer is Cloudflare/trusted ingress.
    option forwardfor
    timeout connect 5s
    timeout client 30s
    timeout server 30s
    timeout http-request 10s

resolvers docker
    nameserver dns 127.0.0.11:53
    accepted_payload_size 8192
    hold valid 5s

frontend treehammock_http
    bind *:8080
    # Local integration is plain HTTP inside Docker. Production behind Cloudflare should set this to https.
    http-request set-header X-Forwarded-Proto http
    http-request set-header X-Forwarded-Host %[req.hdr(Host)]
    default_backend treehammock_api

backend treehammock_api
    balance roundrobin
    option httpchk GET /health/ready
    http-check expect status 200

    server-template api 8 api:5001 check resolvers docker init-addr libc,none
