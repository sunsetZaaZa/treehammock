stages:
  - integration

workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "parent_pipeline"'

variables:
  DOCKER_BUILDKIT: "1"
  DOCKER_HOST: tcp://docker:2375
  DOCKER_TLS_CERTDIR: ""
  BUILD_CONFIGURATION: "Release"

docker-integration-direct:
  image: docker:27-cli
  stage: integration
  timeout: 45 minutes
  services:
    - name: docker:27-dind
      alias: docker
  before_script:
    - apk add --no-cache bash
    - chmod +x eng/*.sh
    - docker version
    - docker compose version
  script:
    - ./eng/docker-http-contracts-direct.sh
  after_script:
    - docker compose -f docker-compose.integration.yml -f docker-compose.api-direct.yml --profile http down --volumes --remove-orphans || true
  artifacts:
    when: always
    paths:
      - "**/*.trx"
      - "tests/http/**/reports/**"
    expire_in: 14 days
