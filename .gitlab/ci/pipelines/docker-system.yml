stages:
  - system

workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "parent_pipeline"'

variables:
  DOCKER_BUILDKIT: "1"
  DOCKER_HOST: tcp://docker:2375
  DOCKER_TLS_CERTDIR: ""
  BUILD_CONFIGURATION: "Release"

docker-system-stack-tests:
  image: docker:27-cli
  stage: system
  timeout: 60 minutes
  services:
    - name: docker:27-dind
      alias: docker
  before_script:
    - apk add --no-cache bash
    - chmod +x eng/*.sh
    - docker version
    - docker compose version
  script:
    - ./eng/docker-system-stack-tests.sh
  after_script:
    - docker compose -f docker-compose.integration.yml -f docker-compose.api-proxy.yml -f docker-compose.ci-system.yml --profile proxy --profile system logs --no-color > treehammock-system-stack.log || true
    - docker compose -f docker-compose.integration.yml -f docker-compose.api-proxy.yml -f docker-compose.ci-system.yml --profile proxy --profile system down --volumes --remove-orphans || true
  artifacts:
    when: always
    paths:
      - "**/treehammock-system-tests.trx"
      - "treehammock-system-stack.log"
    expire_in: 14 days
