<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Verify your account</title>
</head>
<body style="margin:0;background:#f6f8fb;font-family:Arial,Helvetica,sans-serif;color:#172033;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#f6f8fb;padding:32px 16px;">
    <tr>
      <td align="center">
        <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:600px;background:#ffffff;border:1px solid #dce3ef;border-radius:16px;overflow:hidden;">
          <tr>
            <td style="padding:32px;">
              <p style="margin:0 0 12px;font-size:12px;font-weight:bold;text-transform:uppercase;letter-spacing:.08em;color:#4361ee;">Account verification</p>
              <h1 style="margin:0 0 16px;font-size:28px;line-height:1.15;color:#172033;">Verify your account</h1>
              <p style="margin:0 0 24px;font-size:16px;line-height:1.6;color:#48556a;">Use the button below to complete account verification.</p>
              <p style="margin:0 0 24px;"><a href="%verifyUrl" style="display:inline-block;background:#172033;color:#ffffff;text-decoration:none;padding:12px 18px;border-radius:10px;font-weight:bold;">Verify account</a></p>
              <p style="margin:0;font-size:13px;line-height:1.5;color:#6b7280;">If the button does not work, copy and paste this link into your browser:<br><a href="%verifyUrl" style="color:#4361ee;word-break:break-all;">%verifyUrl</a></p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
