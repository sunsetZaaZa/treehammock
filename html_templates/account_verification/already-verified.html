<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Account already verified</title>
  <style>
    :root { color-scheme: light dark; }
    body { margin: 0; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f6f8fb; color: #172033; }
    main { min-height: 100vh; display: grid; place-items: center; padding: 2rem; box-sizing: border-box; }
    .card { width: min(100%, 38rem); background: #ffffff; border: 1px solid #dce3ef; border-radius: 1.25rem; padding: 2rem; box-shadow: 0 1.5rem 4rem rgba(23, 32, 51, 0.12); }
    .eyebrow { margin: 0 0 .75rem; font-size: .8rem; letter-spacing: .08em; text-transform: uppercase; color: #2f6b4f; font-weight: 700; }
    h1 { margin: 0 0 1rem; font-size: clamp(2rem, 6vw, 3rem); line-height: 1; }
    p { margin: 0; font-size: 1rem; line-height: 1.65; color: #48556a; }
    @media (prefers-color-scheme: dark) { body { background: #0f172a; color: #e5ecff; } .card { background: #111c31; border-color: #263552; box-shadow: none; } p { color: #b9c4d8; } }
  </style>
</head>
<body>
  <main>
    <section class="card" aria-labelledby="title">
      <p class="eyebrow">Already verified</p>
      <h1 id="title">This account is already verified</h1>
      <p>No further action is needed. You can return to the application and sign in.</p>
    </section>
  </main>
</body>
</html>
